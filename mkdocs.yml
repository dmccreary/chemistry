site_name: AP Chemistry
repo_url: https://github.com/dmccreary/chemistry
site_url: https://dmccreary.github.io/chemistry/
site_description: An interactive intelligent textbook for AP chemistry designed for college credit.
site_author: Dan McCreary

nav:
  - Home: index.md
  - About the Course: about.md
  - Course Description: course-description.md

  - Chapters:
    - Overview: chapters/index.md
    - 1. Foundations of Chemistry:
      - Content: chapters/01-foundations-of-chemistry/index.md
      - Quiz: chapters/01-foundations-of-chemistry/quiz.md
    - 2. Atomic Structure: chapters/02-atomic-structure-and-mass-spectrometry/index.md
    - 3. Electron Config and Trends: chapters/03-electron-configuration-and-periodic-trends/index.md
    - 4. Bonding and Lewis Structures: chapters/04-chemical-bonding-and-lewis-structures/index.md
    - 5. Molecular Geometry: chapters/05-molecular-geometry-and-polarity/index.md
    - 6. IMF and States of Matter: chapters/06-intermolecular-forces-and-states-of-matter/index.md
    - 7. Phase Changes and Solutions: chapters/07-phase-changes-solutions-and-gas-laws/index.md
    - 8. Chemical Reactions: chapters/08-chemical-reactions-and-equations/index.md
    - 9. Stoichiometry and Analysis: chapters/09-stoichiometry-titrations-and-analysis/index.md
    - 10. Reaction Rates: chapters/10-reaction-rates-and-rate-laws/index.md
    - 11. Mechanisms and Catalysis: chapters/11-reaction-mechanisms-and-catalysis/index.md
    - 12. Enthalpy and Calorimetry: chapters/12-energy-enthalpy-and-calorimetry/index.md
    - 13. Entropy and Gibbs Energy: chapters/13-entropy-and-gibbs-free-energy/index.md
    - 14. Chemical Equilibrium: chapters/14-chemical-equilibrium/index.md
    - 15. Solubility Equilibria: chapters/15-solubility-equilibria/index.md
    - 16. Acid-Base Theory and pH: chapters/16-acid-base-theory-and-ph/index.md
    - 17. Buffers and Titrations: chapters/17-buffers-and-acid-base-titrations/index.md
    - 18. Electrochemistry: chapters/18-electrochemistry/index.md

  - MicroSims:
    - List of MicroSims: sims/index.md
    - Atomic Structure Diagram: sims/atomic-structure-diagram/index.md
    - Dimensional Analysis Practice: sims/dimensional-analysis-practice/index.md
    - Interactive Mass Spectrometer: sims/mass-spectrometer-sim/index.md
    - Interactive Orbital Shape Visualizer: sims/orbital-shape-visualizer/index.md
    - PES Spectrum Interactive Visualizer: sims/pes-spectrum-visualizer/index.md
    - Periodic Trends Explorer: sims/periodic-trends-explorer/index.md
    - Ionic Crystal Lattice Visualizer: sims/ionic-lattice-visualizer/index.md
    - Interactive Lewis Structure Builder: sims/lewis-structure-builder/index.md
    - VSEPR Molecular Geometry Builder: sims/vsepr-geometry-builder/index.md
    - MO Energy Diagram Explorer: sims/mo-energy-diagram/index.md
    - IMF Strength Explorer: sims/imf-strength-explorer/index.md
    - Ideal Gas Law Simulator: sims/ideal-gas-law-simulator/index.md
    - Interactive Density Graphing MicroSim: sims/density-graphing/index.md
    - Matter Classification Flowchart: sims/matter-classification-flowchart/index.md
    - mhchem Rendering Test: sims/mhchem-test/index.md
    - Precision vs Accuracy Target Diagram: sims/precision-accuracy/index.md
    - Scientific Method Workflow: sims/scientific-method/index.md
    - SMILES Drawing Test: sims/smiles-drawing-test/index.md

  - Appendices:
    - List of Appendices: appendices/index.md

  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept List: learning-graph/concept-list.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Graph Quality Metrics: learning-graph/quality-metrics.md
    - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
    - Mascot Test: learning-graph/mascot-test.md

  - Sample Prompts:
    - List of Prompts: prompts/index.md
    - Chemistry Diagram Rendering Options: prompts/chemistry-diagram-rendering-options.md
    - prompts/atomic-structure-diagram-refinement.md
    - prompts/generate-chapter-content.md
    - prompts/learning-graph.md
    - prompts/missing-concepts-analysis.md
    - prompts/prepair-to-generate-content.md
    - prompts/seed-prompt.md
  
  - Glossary: glossary.md
  - FAQ: faq.md

  - License: license.md
  - Contact: contact.md

theme:
  name: material
  logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'teal'
    accent: 'white'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social
  - social_override

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - https://cdn.jsdelivr.net/npm/smiles-drawer@1.2.0/dist/smiles-drawer.min.js
  - js/smiles.js
  - js/mathjax-config.js
  - https://unpkg.com/mathjax@3/es5/tex-chtml.js

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2025 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Chemistry
  textbook_version: "1.0"
  analytics:
    provider: google
    property: G-PCWGBK1CQS
